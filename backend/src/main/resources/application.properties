spring.application.name=lost-found-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/lost_found_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Suriya@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:./uploads/
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.server.port=8080

# --- EMAIL SETTINGS (Live) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=suriyasricse@gmail.com
spring.mail.password=Suriya@123

# DEBUG LOGGING - This will show the real error in your terminal!
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.lostfound=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data=DEBUG

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true